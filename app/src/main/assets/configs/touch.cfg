// On-screen touch controls for the NZ:P Android build.
// Adapted from FTEQW's default droid touch layout (fteqw/engine/droid/configs/touch.cfg).
// Image paths are relative to the APK, under gfx/ (see app/src/main/assets/gfx/).
//
// TODO(bring-up): replace this generic Quake movement layout with a zombies
// layout (ADS, fire, reload, knife, sprint, grenade, switch-weapon, buy/use).

showpic_removeall

sv_aim 0.90

// movement (bottom-left cluster)
showpic gfx/touch_moveforward.tga  forward    -16  -88  bm  32  32  +forward
showpic gfx/touch_moveback.tga     moveback   -16  -56  bm  32  32  +back
showpic gfx/touch_moveleft.tga     moveleft   -48  -56  bm  32  32  +moveleft
showpic gfx/touch_moveright.tga    moveright   16  -56  bm  32  32  +moveright

// actions (bottom-right cluster)
showpic gfx/touch_attack.tga       attack     -80  -56  bm  32  32  +attack
showpic gfx/touch_jump.tga         jump        48  -56  bm  32  32  +jump

// look (turn buttons; right-thumb drag also looks)
showpic gfx/touch_turnleft.tga     turnleft  -112  -56  bm  32  32  +left
showpic gfx/touch_turnright.tga    turnright   80  -56  bm  32  32  +right
