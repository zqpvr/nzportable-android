name: Auto build APK

# Rebuilds the signed release APK against the latest NZ:P (engine, game code, and data)
# and publishes it as a GitHub release. Runs weekly and on manual trigger.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # Mondays, 06:00 UTC

permissions:
  contents: write   # create releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update engine to latest and apply our patch
        run: |
          git -C fteqw fetch --depth 1 origin
          git -C fteqw checkout -f origin/master 2>/dev/null || git -C fteqw checkout -f origin/main
          git apply --3way patches/0001-fteqw-android-build.patch

      - name: Build game code (.dats) from latest quakec + our patch
        run: |
          git clone --depth 1 https://github.com/nzp-team/quakec.git quakec
          git -C quakec apply --3way ../patches/0002-nzp-quakec.patch
          chmod +x quakec/bin/fteqcc-cli-lin
          ( cd quakec/bin && ./fteqcc-cli-lin -DFTE -srcfile ../progs/csqc.src && ./fteqcc-cli-lin -DFTE -srcfile ../progs/menu.src )

      - name: Fetch latest game data (nightly) and overlay our files
        run: |
          # keep our config + LAN list (don't take the upstream ones)
          cp app/src/main/assets/nzp/nzportable.cfg /tmp/nzportable.cfg
          cp app/src/main/assets/nzp/masters.txt /tmp/masters.txt
          curl -fL -o nzp.zip https://github.com/nzp-team/nzportable/releases/download/nightly/nzportable-linux64.zip
          rm -rf app/src/main/assets/nzp /tmp/nzpx
          mkdir -p /tmp/nzpx app/src/main/assets
          unzip -q nzp.zip -d /tmp/nzpx
          cp -r "$(find /tmp/nzpx -type d -name nzp | head -1)" app/src/main/assets/nzp
          # overlay our built game code + preserved config
          cp quakec/build/fte/csprogs.dat app/src/main/assets/nzp/csprogs.dat
          cp quakec/build/fte/menu.dat    app/src/main/assets/nzp/menu.dat
          cp /tmp/nzportable.cfg          app/src/main/assets/nzp/nzportable.cfg
          cp /tmp/masters.txt             app/src/main/assets/nzp/masters.txt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
      - run: sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app:assembleRelease --no-daemon --console=plain

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date +%Y%m%d)
          TAG="auto-$DATE-${{ github.run_number }}"
          DATAVER=$(cat app/src/main/assets/nzp/version.txt 2>/dev/null || echo unknown)
          mv app/build/outputs/apk/release/app-release.apk "nzportable-android-$TAG.apk"
          gh release create "$TAG" "nzportable-android-$TAG.apk" \
            --title "Auto build $DATE" \
            --notes "Automated build against the latest NZ:P (data $DATAVER)."
